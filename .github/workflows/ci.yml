name: CI

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  tests:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
            locked: true
          - os: ubuntu-latest
            python: "3.12"
            locked: true
          - os: ubuntu-latest
            python: "3.13"
            locked: true
          - os: windows-latest
            python: "3.13"
            locked: false
          - os: macos-latest
            python: "3.13"
            locked: false
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements.txt
            requirements-dev.txt

      # requirements.lock was resolved on Linux. PyInstaller has additional
      # platform-specific dependencies on Windows and macOS, so those runners
      # intentionally resolve requirements.txt instead.
      - name: Install locked runtime dependencies
        if: matrix.locked
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Install platform-resolved runtime dependencies
        if: ${{ !matrix.locked }}
        run: python -m pip install -r requirements.txt

      - name: Install test dependency
        run: python -m pip install pytest

      - name: Run tests
        run: python -m pytest -q

  quality:
    name: Quality and release validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.txt

      - name: Install locked runtime and development dependencies
        run: |
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install -r requirements-dev.txt

      - name: Run Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Validate JSON resources
        shell: python
        run: |
          import json
          from pathlib import Path

          paths = sorted(Path("config").rglob("*.json"))
          if not paths:
              raise SystemExit("No JSON resources found under config/")
          for path in paths:
              with path.open(encoding="utf-8") as stream:
                  json.load(stream)
          print(f"Validated {len(paths)} JSON resources")

      - name: Audit locked runtime dependencies
        run: python -m pip_audit --strict --require-hashes -r requirements.lock

      - name: Validate PyInstaller command
        run: python scripts/build_pyinstaller.py --dry-run --onefile --windowed
